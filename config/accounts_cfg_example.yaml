accounts:
    Main:
        type: activebank-debit
        username: USERNAME
        card_number: XXXXXXXXXX
        category_taggers:
            regex:
                Salary:
                    - "(\\s|\\d|\\w|\\W)*VENCIMENTO(\\s|\\d|\\w|\\W)*"
                Rent:
                    - "TRF\\s\"*P\\/\\s*\\w*CASA"
                Tolls:
                    - "PAG\\sBXVAL\\s*-\\s\\d{4}\\sVIAVERDE"
                Withdraw:
                    - "LEV\\s*ATM\\s*\\d{4}(\\s|\\d|\\w|\\W)*"
            historic_from:
                    - "Main"
    Secondary:
        type: nordigen-account
        secret_id: b0b87d52-43cb-ab0d-63a3-9f53kg016adb
        secret_key: ...
        account: ...
        cache_policy: use_if_fresh
        cache_ttl_hours: 3
        cache_dir: .cache/nordigen
        category_taggers:
            # regex:
            #     Salary:
            #         - "(\\s|\\d|\\w|\\W)*VENCIMENTO(\\s|\\d|\\w|\\W)*"
            #     Rent:
            #         - "TRF\\s\"*P\\/\\s*\\w*CASA"
            #     Tolls:
            #         - "PAG\\sBXVAL\\s*-\\s\\d{4}\\sVIAVERDE"
            #     Withdraw:
            #         - "LEV\\s*ATM\\s*\\d{4}(\\s|\\d|\\w|\\W)*"
            historic_from:
                    - "Main"
    Precard:
        type: activebank-precard
        username: USERNAME
        card_number: XXXXXXXXXXXXXXX
        category_taggers:
            historic_from:
                - "Precard"
            regex:
                Withdraw:
                    - "LEV\\s*ATM\\s*\\d{4}(\\s|\\d|\\w|\\W)*"
    MyEdenred:
        type: myedenred
        username: my@email.com
        card_number: XXXXXX
        category_taggers:
            historic_from:
                - "MealAllowance"
    Checking:
        type: nordigen-account
        token: XXXXXXXXXXXXXXXXXXXXX
        account: XXXXXXXXXXXXXXXXXXXXXXXXXXX
        cache_policy: use_if_fresh
        cache_ttl_hours: 3
        cache_dir: .cache/nordigen
        category_taggers:
            historic_from:
                    - "Main"
transactions:
  debt: "Debt"
  income: "Income"
  transfer: "Transfer"
  investment: "Investment"
  date_format: "%Y-%m-%d"
repositories:
  googlesheet:
    scopes:
      - https://www.googleapis.com/auth/spreadsheets
    spreadsheet_id: "1UjskdKHskMmio78JsN2fKg1nqxtt_pcoywnBu2Ow"
    credentials_path: "/full/path/to/credentials.json"
    expenses_sheet_name: Expenses
    expenses_start_cell: A1
    metadata_sheet_name: Data
    token_cache_path: "path/to/token.pickle"

expense_fetcher_options:
  tmp_dir_path: "path/to/tmp_dir"
